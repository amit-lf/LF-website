  <line x1="1091" y1="338" x2="1091" y2="500" stroke="#E3BB9B" stroke-width="1" opacity="0.28"/>
  <line x1="1117" y1="338" x2="1117" y2="500" stroke="#E3BB9B" stroke-width="1" opacity="0.28"/>
