<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="1500" height="500" fill="#0d0d0d"/>

  <!-- Subtle radial glow behind chip -->
  <defs>
    <radialGradient id="chipGlow" cx="73%" cy="50%" r="38%">
      <stop offset="0%" stop-color="#E3BB9B" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#E3BB9B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="28%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#E3BB9B" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#E3BB9B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#chipGlow)"/>
  <rect width="1500" height="500" fill="url(#leftGlow)"/>

  <!-- Background circuit traces (left decorative) -->
  <line x1="0" y1="90"  x2="680" y2="90"  stroke="#E3BB9B" stroke-width="0.5" opacity="0.07"/>
  <line x1="0" y1="180" x2="500" y2="180" stroke="#E3BB9B" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="320" x2="600" y2="320" stroke="#E3BB9B" stroke-width="0.5" opacity="0.06"/>
  <line x1="0" y1="410" x2="450" y2="410" stroke="#E3BB9B" stroke-width="0.5" opacity="0.05"/>
  <line x1="160" y1="0"  x2="160" y2="140" stroke="#E3BB9B" stroke-width="0.5" opacity="0.07"/>
  <line x1="340" y1="0"  x2="340" y2="90"  stroke="#E3BB9B" stroke-width="0.5" opacity="0.05"/>
  <line x1="520" y1="320" x2="520" y2="500" stroke="#E3BB9B" stroke-width="0.5" opacity="0.05"/>
  <line x1="220" y1="410" x2="220" y2="500" stroke="#E3BB9B" stroke-width="0.5" opacity="0.06"/>

  <!-- Vertical divider -->
  <line x1="760" y1="100" x2="760" y2="400" stroke="#E3BB9B" stroke-width="0.75" opacity="0.18"/>

  <!-- ── Left: Brand content ───────────────────────────────── -->

  <!-- Badge pill -->
  <rect x="80" y="122" width="394" height="28" rx="14" fill="rgba(227,187,155,0.1)" stroke="rgba(227,187,155,0.28)" stroke-width="1"/>
  <text x="277" y="141" text-anchor="middle" fill="#E3BB9B" font-size="10.5" font-weight="700" letter-spacing="0.09em">CONTRACT INTELLIGENCE · SEMICONDUCTOR</text>

  <!-- Brand name -->
  <text x="80" y="258" font-size="96" font-weight="800" letter-spacing="-0.03em">
    <tspan fill="#ffffff">Legal</tspan><tspan fill="#E3BB9B">Forensics</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="310" fill="#777" font-size="23" font-weight="400" letter-spacing="0.005em">Know where you&#8217;re exposed before you sign.</text>

  <!-- Sub-label: contract types -->
  <text x="80" y="358" fill="#555" font-size="13" font-weight="600" letter-spacing="0.08em">FOUNDRY · OSAT · IP LICENSING · HYPERSCALER · DARPA</text>


